services:
  backend:
    build:
      context: .
      dockerfile: Lammah-game-backend/Dockerfile
    env_file:
      - ./Lammah-game-backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${BACKEND_MONGODB_URI:-mongodb://host.docker.internal:27017/lammah-quiz}
      LMSTUDIO_BASE_URL: ${BACKEND_LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LM_STUDIO_BASE_URL: ${BACKEND_LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      UPLOADS_DIR: /app/uploads
      MUSIC_QUESTION_CATEGORY_SLUG: ${MUSIC_QUESTION_CATEGORY_SLUG:-songs}
      MUSIC_DELETE_ORIGINAL_AFTER_SNIPPET: ${MUSIC_DELETE_ORIGINAL_AFTER_SNIPPET:-false}
      ALLOW_YOUTUBE_ASSET_DOWNLOADS: ${ALLOW_YOUTUBE_ASSET_DOWNLOADS:-true}
      JIKAN_PROVIDER_ENABLED: ${JIKAN_PROVIDER_ENABLED:-true}
      JIKAN_API_BASE_URL: ${JIKAN_API_BASE_URL:-https://api.jikan.moe/v4}
      JIKAN_REQUEST_TIMEOUT_MS: ${JIKAN_REQUEST_TIMEOUT_MS:-10000}
      JIKAN_CACHE_TTL_MS: ${JIKAN_CACHE_TTL_MS:-86400000}
      JIKAN_NEGATIVE_CACHE_TTL_MS: ${JIKAN_NEGATIVE_CACHE_TTL_MS:-600000}
      WIGOLO_EXECUTABLE_PATH: /app/node_modules/.bin/wigolo
      WIGOLO_CACHE_FILE: /app/.cache/entity-verification.json
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Lammah-game-frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  backend_uploads:
  mongodb_data:
