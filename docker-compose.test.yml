services:
  mongodb-test:
    image: mongo:7
    ports: ["127.0.0.1:27018:27017"]
    tmpfs: [/data/db]
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend-integration:
    image: node:20-alpine
    working_dir: /workspace
    volumes: [".:/workspace"]
    environment:
      NODE_ENV: test
      TEST_MONGODB_URI: mongodb://mongodb-test:27017/lammah_integration_test
      MONGODB_URI: mongodb://mongodb-test:27017/lammah_integration_test
      JWT_SECRET: docker-integration-only-secret
      EXTERNAL_INTEGRATIONS_DISABLED: "true"
      NODE_PATH: /workspace/Lammah-game-backend/node_modules:/workspace/node_modules
    command: npm run test:backend:integration
    depends_on:
      mongodb-test: { condition: service_healthy }
    profiles: ["integration"]

  media-integration:
    build:
      context: .
      dockerfile: Lammah-game-backend/Dockerfile
      target: build
    working_dir: /app
    command: sh -c "apk add --no-cache ffmpeg && npm run test:media:integration"
    profiles: ["media"]

  backend-e2e:
    build:
      context: .
      dockerfile: Lammah-game-backend/Dockerfile
      target: build
    working_dir: /app
    environment:
      NODE_ENV: test
      TEST_MONGODB_URI: mongodb://mongodb-test:27017/lammah_e2e_test
      MONGODB_URI: mongodb://mongodb-test:27017/lammah_e2e_test
      JWT_SECRET: docker-e2e-only-secret
      EXTERNAL_INTEGRATIONS_DISABLED: "true"
      PORT: 3000
      NODE_PATH: /app/Lammah-game-backend/node_modules:/app/node_modules
      AI_PROVIDER: lmstudio
      LMSTUDIO_BASE_URL: http://127.0.0.1:9/v1
      CORS_ORIGINS: http://127.0.0.1:3201
    command: sh -c "npm run test:fixtures:seed --workspace Lammah-game-backend && npm run start --workspace Lammah-game-backend"
    ports: ["127.0.0.1:3100:3000"]
    depends_on:
      mongodb-test: { condition: service_healthy }
    profiles: ["e2e"]

  frontend-e2e:
    build:
      context: .
      dockerfile: Lammah-game-frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:3100
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3100
    ports: ["127.0.0.1:3201:3001"]
    depends_on: [backend-e2e]
    profiles: ["e2e"]
